<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Explore Courses - ELP Platform</title>

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    /* --- BASE LAYOUT --- */
    body { background-color: #f4f7fe; font-family: 'Segoe UI', system-ui, sans-serif; }
    .top-navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: white; border-bottom: 1px solid #e2e8f0; padding: 0.8rem 2.5rem;
    }
    .sidebar {
      min-height: 100vh; background: white; border-right: 1px solid #e2e8f0;
      position: fixed; width: 250px; top: 0; left: 0; padding-top: 85px;
      overflow-y: auto; z-index: 900; transition: transform 0.3s ease;
    }
    .sidebar .nav-link {
      color: #64748b; padding: 0.85rem 1.5rem; font-weight: 500;
      border-left: 3px solid transparent; margin-bottom: 0.2rem;
    }
    .sidebar .nav-link:hover, .sidebar .nav-link.active {
      background-color: #f8fafc; color: #0d6efd; border-left: 3px solid #0d6efd;
    }
    .sidebar .nav-link i { width: 24px; text-align: center; margin-right: 12px; }
    .main-content { margin-left: 250px; padding: 6rem 2.5rem 2rem 2.5rem; }

    /* --- MOBILE RESPONSIVENESS --- */
    @media (max-width: 992px) {
      .sidebar { transform: translateX(-100%); z-index: 1040; }
      .sidebar.show { transform: translateX(0); }
      .main-content { margin-left: 0 !important; padding: 6rem 1rem 2rem 1rem; }
      .top-navbar { padding: 0.8rem 1rem; }
    }

    /* --- COURSE CATALOG UI --- */
    .filter-bar {
      background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      padding: 1rem 1.5rem; margin-bottom: 2rem;
    }
    .course-card {
      border: none; border-radius: 16px; overflow: hidden;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      background: white; transition: all 0.3s ease; height: 100%;
      display: flex; flex-direction: column;
    }
    .course-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 20px -3px rgba(0,0,0,0.1);
    }
    .course-thumbnail {
      height: 180px; background-size: cover; background-position: center; position: relative;
    }
    .badge-floating {
      position: absolute; top: 12px; left: 12px;
      background: rgba(255,255,255,0.9); color: #0f172a;
      font-weight: 600; padding: 0.4rem 0.8rem; border-radius: 8px; font-size: 0.8rem;
    }
    .card-body { display: flex; flex-direction: column; flex-grow: 1; padding: 1.5rem; }
    .instructor-name { font-size: 0.85rem; color: #64748b; margin-bottom: 0.5rem; }
    .course-meta { font-size: 0.85rem; color: #64748b; display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
    .course-meta i { color: #f59e0b; }
    .mt-auto { margin-top: auto; }
  </style>
</head>
<body>

<!-- Top Navbar -->
<nav class="top-navbar navbar navbar-expand-lg">
  <div class="container-fluid">
    <button class="btn btn-light d-lg-none me-3 border-0" onclick="document.querySelector('.sidebar').classList.toggle('show')">
      <i class="fas fa-bars"></i>
    </button>
    <a class="navbar-brand fw-bold fs-4" href="../dashboard.html">
      ELP <span class="text-primary">Platform</span>
    </a>
    <div class="ms-auto d-flex align-items-center gap-3">
      <!-- Profile Dropdown -->
      <div class="dropdown">
        <a class="d-flex align-items-center text-decoration-none dropdown-toggle" href="#" data-bs-toggle="dropdown">
          <div class="me-3 text-end d-none d-sm-block">
            <div id="userFullName" class="fw-bold text-dark mb-0 lh-1">Loading...</div>
            <small id="userRoleBadge" class="text-muted" style="font-size: 0.8rem;"></small>
          </div>
          <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center shadow-sm" style="width:42px; height:42px;">
            <i class="fas fa-user"></i>
          </div>
        </a>
        <ul class="dropdown-menu dropdown-menu-end shadow-sm">
          <li><a class="dropdown-item py-2" href="profile.html"><i class="fas fa-user-circle me-2 text-muted"></i> Profile</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item py-2 text-danger" href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i> Logout</a></li>
        </ul>
      </div>
    </div>
  </div>
</nav>

<!-- Sidebar -->
<div class="sidebar shadow-sm">
  <div class="nav flex-column" id="sidebarMenu">
    <!-- Populated by JS -->
  </div>
</div>

<!-- Main Content -->
<div class="main-content">

  <div class="mb-4">
    <h2 class="fw-bold text-dark mb-1">Explore Courses</h2>
    <p class="text-muted">Discover new skills and elevate your career.</p>
  </div>

  <!-- Filter & Search Toolbar -->
  <div class="filter-bar d-flex flex-wrap gap-3 align-items-center justify-content-between">
    <div class="d-flex flex-wrap gap-3 flex-grow-1">
      <div class="input-group" style="max-width: 350px;">
        <span class="input-group-text bg-light border-end-0"><i class="fas fa-search text-muted"></i></span>
        <input type="text" id="searchInput" class="form-control bg-light border-start-0" placeholder="Search for courses...">
      </div>
      <select id="categoryFilter" class="form-select bg-light w-auto border-light">
        <option value="">All Categories</option>
        <option value="Database">Database</option>
        <option value="Programming">Programming</option>
        <option value="Web Development">Web Development</option>
        <option value="Data Science">Data Science</option>
      </select>
      <select id="levelFilter" class="form-select bg-light w-auto border-light">
        <option value="">All Levels</option>
        <option value="Beginner">Beginner</option>
        <option value="Intermediate">Intermediate</option>
        <option value="Advanced">Advanced</option>
      </select>
    </div>
    <div>
      <select id="sortFilter" class="form-select bg-white fw-medium shadow-sm">
        <option value="popular">Most Popular</option>
        <option value="newest">Newest</option>
        <option value="rating">Highest Rated</option>
      </select>
    </div>
  </div>

  <!-- Course Grid -->
  <div class="row g-4" id="courseGrid">
    <!-- Courses injected via JS -->
  </div>

  <!-- Empty State -->
  <div id="noResults" class="text-center py-5 d-none">
    <i class="fas fa-search fa-3x text-muted opacity-50 mb-3"></i>
    <h5 class="fw-bold text-dark">No courses found</h5>
    <p class="text-muted">Try adjusting your search or filters.</p>
    <button class="btn btn-outline-primary mt-2" onclick="resetFilters()">Clear Filters</button>
  </div>

</div>

<!-- Success Toast Notification -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="enrollToast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body fw-medium">
        <i class="fas fa-check-circle me-2"></i> Successfully enrolled! You can now start learning.
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
// ────────────────────────────────────────────────
// User Setup & Security
// ────────────────────────────────────────────────
const role = localStorage.getItem('userRole') || 'student';
const name = localStorage.getItem('userName') || 'User';
const userId = localStorage.getItem('userId') || 0;

if (role !== 'student') {
  alert("The course catalog is primarily for students.");
  window.location.href = '../dashboard.html';
}

document.getElementById('userFullName').textContent = name;
document.getElementById('userRoleBadge').textContent = 'Student';

document.getElementById('sidebarMenu').innerHTML = `
  <a href="../dashboard.html" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a>
  <a href="courses.html" class="nav-link"><i class="fas fa-book"></i> My Courses</a>
  <a href="enroll.html" class="nav-link active"><i class="fas fa-compass"></i> Explore</a>
  <a href="assessment.html" class="nav-link"><i class="fas fa-pen-square"></i> Assessments</a>
  <a href="profile.html" class="nav-link"><i class="fas fa-user"></i> Profile</a>
`;

// Global variable to store fetched catalog
let catalogCourses = [];

// ────────────────────────────────────────────────
// API Data Fetching & Rendering
// ────────────────────────────────────────────────
async function loadCatalog() {
    try {
        const response = await fetch(`http://localhost/elp_project/api/courses/get_catalog.php?userId=${userId}`);
        catalogCourses = await response.json();
        filterAndRender(); // Render the courses initially
    } catch (error) {
        console.error("Error loading catalog:", error);
    }
}

function renderCatalog(courses) {
  const grid = document.getElementById('courseGrid');
  const noResults = document.getElementById('noResults');
  grid.innerHTML = '';

  if (courses.length === 0) {
    noResults.classList.remove('d-none');
    return;
  } else {
    noResults.classList.add('d-none');
  }

  courses.forEach(course => {
    const col = document.createElement('div');
    col.className = 'col-xl-4 col-md-6';

    col.innerHTML = `
      <div class="course-card">
        <div class="course-thumbnail" style="background-image: url('${course.ThumbnailURL}')">
          <div class="badge-floating shadow-sm">${course.Category || 'General'}</div>
        </div>
        
        <div class="card-body">
          <h5 class="fw-bold text-dark mb-1">${course.Title}</h5>
          <div class="instructor-name"><i class="fas fa-chalkboard-teacher me-1"></i> ${course.InstructorName}</div>
          
          <div class="course-meta">
            <span><i class="fas fa-star"></i> ${course.Rating} (${course.StudentCount})</span>
            <span><i class="far fa-clock text-muted"></i> ${course.Duration || 'Self-paced'}</span>
            <span class="badge bg-light text-dark border ms-auto">${course.Level || 'All Levels'}</span>
          </div>

          <div class="mt-auto pt-3 border-top d-flex justify-content-between align-items-center">
            <span class="fw-bold text-success fs-5">Free</span>
            ${course.IsEnrolled ? 
              `<button class="btn btn-outline-primary px-4 rounded-pill" onclick="window.location.href='courses.html'">Go to Course</button>` : 
              `<button class="btn btn-primary px-4 rounded-pill fw-medium" id="btn-enroll-${course.CourseID}" onclick="enrollCourse(${course.CourseID}, this)">Enroll Now</button>`
            }
          </div>
        </div>
      </div>
    `;
    grid.appendChild(col);
  });
}

// ────────────────────────────────────────────────
// Search & Filter Logic
// ────────────────────────────────────────────────
function filterAndRender() {
  let filtered = [...catalogCourses];

  // Search
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  if (search) {
    filtered = filtered.filter(c => 
        c.Title.toLowerCase().includes(search) || 
        c.InstructorName.toLowerCase().includes(search)
    );
  }
  // Category
  const cat = document.getElementById('categoryFilter').value;
  if (cat) filtered = filtered.filter(c => c.Category === cat);
  
  // Level
  const lvl = document.getElementById('levelFilter').value;
  if (lvl) filtered = filtered.filter(c => c.Level === lvl);

  // Sort
  const sort = document.getElementById('sortFilter').value;
  if (sort === 'rating') filtered.sort((a,b) => b.Rating - a.Rating);
  else if (sort === 'popular') filtered.sort((a,b) => b.StudentCount - a.StudentCount);
  else if (sort === 'newest') filtered.sort((a,b) => b.CourseID - a.CourseID); // Assuming larger ID is newer

  renderCatalog(filtered);
}

// Attach Listeners
document.getElementById('searchInput').addEventListener('input', filterAndRender);
document.getElementById('categoryFilter').addEventListener('change', filterAndRender);
document.getElementById('levelFilter').addEventListener('change', filterAndRender);
document.getElementById('sortFilter').addEventListener('change', filterAndRender);

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('categoryFilter').value = '';
  document.getElementById('levelFilter').value = '';
  document.getElementById('sortFilter').value = 'popular';
  filterAndRender();
}

// ────────────────────────────────────────────────
// Enroll Action (POST to API)
// ────────────────────────────────────────────────
async function enrollCourse(courseId, btnElement) {
  // 1. Show Loading State
  btnElement.innerHTML = `<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Enrolling...`;
  btnElement.disabled = true;

  try {
      // 2. Call the PHP API
      const response = await fetch('http://localhost/elp_project/api/courses/enroll_course.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ studentId: userId, courseId: courseId })
      });

      const result = await response.json();

      if(result.success) {
          // Update local data array so it reflects the enrollment immediately
          const course = catalogCourses.find(c => c.CourseID === courseId);
          if (course) {
              course.IsEnrolled = true;
              course.StudentCount++;
          }

          // Change Button visually to "Go to Course"
          btnElement.className = 'btn btn-outline-primary px-4 rounded-pill transition-all';
          btnElement.innerHTML = `Go to Course`;
          btnElement.disabled = false;
          btnElement.onclick = () => window.location.href = 'courses.html';

          // Show Bootstrap Toast Success Message
          const toastEl = document.getElementById('enrollToast');
          const toast = new bootstrap.Toast(toastEl);
          toast.show();
      } else {
          alert("Enrollment failed: " + result.error);
          btnElement.innerHTML = `Enroll Now`;
          btnElement.disabled = false;
      }
  } catch (error) {
      console.error("Enrollment error:", error);
      alert("Something went wrong. Please try again.");
      btnElement.innerHTML = `Enroll Now`;
      btnElement.disabled = false;
  }
}

function logout() {
  localStorage.clear();
  window.location.href = '../index.html';
}

// Start loading data when the page opens
loadCatalog();
</script>

</body>
</html>
