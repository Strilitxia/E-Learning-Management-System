<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Take Quiz - Database Systems Midterm | ELP Platform</title>

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    /* --- BASE LAYOUT CSS (Restored) --- */
    body {
      background-color: #f5f7ff;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .top-navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: white;
      border-bottom: 1px solid #e0e0e0;
      padding: 1rem 2.5rem;
    }
    .sidebar {
      min-height: 100vh;
      background: white;
      border-right: 1px solid #e0e0e0;
      position: fixed;
      width: 240px;
      top: 0; left: 0;
      padding-top: 80px; /* Space for navbar */
      overflow-y: auto;
      z-index: 900;
    }
    .sidebar .nav-link {
      color: #495057;
      padding: 0.9rem 1.5rem;
      font-weight: 500;
    }
    .sidebar .nav-link:hover,
    .sidebar .nav-link.active {
      background-color: #e7f0ff;
      color: #0d6efd;
    }
    .sidebar .nav-link i {
      width: 24px; text-align: center; margin-right: 12px;
    }
    .main-content {
      margin-left: 240px;
      /* Pushed down to clear the fixed navbar */
      padding: 6rem 2.5rem 2rem 2.5rem; 
    }

    /* --- MOBILE RESPONSIVENESS --- */
    @media (max-width: 992px) {
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s ease-in-out;
        z-index: 1040;
      }
      .sidebar.show {
        transform: translateX(0);
      }
      .main-content {
        margin-left: 0 !important;
        padding: 6rem 1rem 2rem 1rem;
      }
      .top-navbar {
        padding: 1rem;
      }
    }

    /* --- QUIZ SPECIFIC CSS --- */
    .quiz-header {
      background: linear-gradient(135deg, #0d6efd, #4d9aff);
      color: white;
      padding: 1.5rem;
      border-radius: 10px 10px 0 0;
    }
    .question-card {
      min-height: 280px;
      border: none;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      background: white;
    }
    .option-label {
      cursor: pointer;
      padding: 1rem 1.25rem;
      border-radius: 8px;
      transition: all 0.2s;
      border: 2px solid #e9ecef;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      background: #fff;
    }
    .option-label:hover {
      background: #f8f9fa;
      border-color: #b6d4fe;
    }
    input[type="radio"]:checked + .option-label,
    .option-label:has(input[type="radio"]:checked) {
      background: #e7f1ff;
      border-color: #0d6efd;
      font-weight: 500;
      color: #0a58ca;
    }
    .timer {
      font-size: 1.5rem;
      font-weight: bold;
      color: #dc3545;
      background: #fff5f5;
      padding: 0.2rem 0.8rem;
      border-radius: 6px;
      display: inline-block;
    }
    .question-nav .btn {
      min-width: 48px;
    }
    .progress {
      height: 8px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

<!-- Top Navbar -->
<nav class="top-navbar navbar navbar-expand-lg">
  <div class="container-fluid">
    <!-- Hamburger menu for mobile -->
    <button class="btn btn-light d-lg-none me-2 border-0" onclick="document.querySelector('.sidebar').classList.toggle('show')">
      <i class="fas fa-bars"></i>
    </button>
    
    <a class="navbar-brand fw-bold fs-4" href="../dashboard.html">
      ELP <span class="text-primary">Platform</span>
    </a>
    
    <div class="ms-auto d-flex align-items-center gap-4">
      <div class="dropdown">
        <a class="d-flex align-items-center text-decoration-none dropdown-toggle" href="#" data-bs-toggle="dropdown">
          <div class="me-3 text-end d-none d-sm-block">
            <div id="userFullName" class="fw-medium">Loading...</div>
            <small id="userRoleBadge" class="text-muted"></small>
          </div>
          <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" style="width:42px;height:42px;">
            <i class="fas fa-user"></i>
          </div>
        </a>
        <ul class="dropdown-menu dropdown-menu-end shadow-sm">
          <li><a class="dropdown-item" href="profile.html"><i class="fas fa-user me-2"></i> Profile</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i> Logout</a></li>
        </ul>
      </div>
    </div>
  </div>
</nav>

<!-- Sidebar -->
<div class="sidebar shadow-sm">
  <div class="nav flex-column" id="sidebarMenu">
    <a href="../dashboard.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
    <a href="courses.html" class="nav-link"><i class="fas fa-book-open"></i> My Courses</a>
    <a href="enroll.html" class="nav-link"><i class="fas fa-search"></i> Browse Courses</a>
    <a href="assessment.html" class="nav-link active"><i class="fas fa-tasks"></i> Assessments</a>
    <a href="profile.html" class="nav-link"><i class="fas fa-user"></i> Profile</a>
  </div>
</div>

<!-- Main Content -->
<div class="main-content">

  <!-- Header & Timer -->
  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
    <div>
      <h3 class="mb-1 fw-bold text-dark">Midterm Quiz: Database Systems</h3>
      <p class="text-muted mb-0"><i class="fas fa-info-circle me-1"></i> 20 questions • 45 minutes</p>
    </div>
    <div class="text-end text-start-sm">
      <div class="timer mb-1 shadow-sm" id="timer">45:00</div>
      <div class="text-muted small fw-medium text-uppercase tracking-wide">Time remaining</div>
    </div>
  </div>

  <div class="progress mb-4 shadow-sm">
    <div class="progress-bar bg-primary progress-bar-striped progress-bar-animated" id="progressBar" role="progressbar" style="width: 0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
  </div>

  <!-- Quiz Card -->
  <div class="card question-card">
    <div class="quiz-header">
      <h6 class="mb-2 text-white-50 text-uppercase fw-bold" id="questionNumber">Question 1 of 20</h6>
      <h5 class="mb-0 lh-base" id="questionText">Loading question...</h5>
    </div>

    <div class="card-body p-4 p-md-5">
      <div class="options" id="optionsContainer">
        <!-- Options injected here via JS -->
      </div>
    </div>
  </div>

  <!-- Navigation -->
  <div class="d-flex justify-content-between align-items-center mt-4 question-nav flex-wrap gap-3">
    <button class="btn btn-outline-secondary px-4 py-2" id="prevBtn" disabled>
      <i class="fas fa-arrow-left me-2"></i> Previous
    </button>

    <div class="d-flex gap-2 flex-wrap justify-content-center" id="questionDots">
      <!-- Dots generated by JS -->
    </div>

    <button class="btn btn-primary px-4 py-2" id="nextBtn">
      Next <i class="fas fa-arrow-right ms-2"></i>
    </button>
  </div>

  <!-- Submit Area -->
  <div class="text-center mt-5 p-4 bg-white rounded-3 shadow-sm d-none" id="submitArea">
    <h5 class="mb-3">Ready to submit?</h5>
    <button class="btn btn-lg btn-success px-5 py-3 shadow" onclick="submitQuiz()">
      <i class="fas fa-check-circle me-2"></i> Submit Quiz
    </button>
    <p class="text-muted mt-3 mb-0 small"><i class="fas fa-exclamation-triangle me-1"></i> Make sure you have answered all questions before submitting.</p>
  </div>

</div>

<script>
// ────────────────────────────────────────────────
// Setup & Get Quiz ID from URL
// ────────────────────────────────────────────────
const role = localStorage.getItem('userRole') || 'student';
const name = localStorage.getItem('userName') || 'User';
const studentId = localStorage.getItem('userId');

document.getElementById('userFullName').textContent = name;
document.getElementById('userRoleBadge').textContent = role.charAt(0).toUpperCase() + role.slice(1);

// Get quizId from URL (e.g., take-quiz.html?quizId=1)
const urlParams = new URLSearchParams(window.location.search);
const quizId = urlParams.get('quizId');

if (!quizId) {
    alert("No quiz selected!");
    window.location.href = "assessment.html";
}

// Global Variables
let quiz = null;
let currentQuestion = 0;
let answers = [];
let timeLeft = 0;
let timerInterval;

// DOM Elements
const questionNumberEl = document.getElementById('questionNumber');
const questionTextEl   = document.getElementById('questionText');
const optionsContainer = document.getElementById('optionsContainer');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const progressBar = document.getElementById('progressBar');
const timerEl = document.getElementById('timer');
const submitArea = document.getElementById('submitArea');
const questionDots = document.getElementById('questionDots');

// ────────────────────────────────────────────────
// Fetch Quiz Data from PHP
// ────────────────────────────────────────────────
async function fetchQuiz() {
    try {
        const response = await fetch(`http://localhost/elp_project/api/assessments/get_quiz_details.php?quizId=${quizId}`);
        quiz = await response.json();

        if(quiz.error) {
            alert(quiz.error);
            window.location.href = "assessment.html";
            return;
        }

        // Setup Quiz
        document.querySelector('h3.fw-bold').textContent = quiz.title;
        answers = new Array(quiz.questions.length).fill(null);
        timeLeft = quiz.duration;

        renderQuestion();
        startTimer();
    } catch (err) {
        console.error("Error loading quiz:", err);
    }
}

// ────────────────────────────────────────────────
// Timer Logic
// ────────────────────────────────────────────────
function startTimer() {
  timerInterval = setInterval(() => {
    timeLeft--;
    const minutes = Math.floor(timeLeft / 60);
    const seconds = timeLeft % 60;
    timerEl.textContent = `${minutes}:${seconds.toString().padStart(2,'0')}`;

    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      alert("Time's up! Your quiz will be auto-submitted.");
      submitQuiz(true);
    }
  }, 1000);
}

// ────────────────────────────────────────────────
// Render Current Question
// ────────────────────────────────────────────────
function renderQuestion() {
  const q = quiz.questions[currentQuestion];

  questionNumberEl.textContent = `Question ${currentQuestion + 1} of ${quiz.questions.length}`;
  questionTextEl.textContent = q.text;

  optionsContainer.innerHTML = '';
  q.options.forEach((opt, i) => {
    const label = document.createElement('label');
    label.className = 'option-label';
    
    const input = document.createElement('input');
    input.type = 'radio';
    input.name = `q${currentQuestion}`;
    input.value = i;
    input.className = 'form-check-input me-3';
    if (answers[currentQuestion] === i) input.checked = true;

    input.addEventListener('change', (e) => {
      answers[currentQuestion] = parseInt(e.target.value);
      updateDots(); 
    });

    label.appendChild(input);
    label.appendChild(document.createTextNode(opt));
    optionsContainer.appendChild(label);
  });

  prevBtn.disabled = currentQuestion === 0;
  nextBtn.textContent = currentQuestion === quiz.questions.length - 1 ? "Finish" : "Next";
  
  if (currentQuestion === quiz.questions.length - 1) {
    nextBtn.classList.replace('btn-primary', 'btn-success');
    submitArea.classList.remove('d-none');
  } else {
    nextBtn.classList.replace('btn-success', 'btn-primary');
    submitArea.classList.add('d-none');
  }

  const progress = ((currentQuestion + 1) / quiz.questions.length) * 100;
  progressBar.style.width = `${progress}%`;
  progressBar.setAttribute('aria-valuenow', Math.round(progress));

  updateDots();
}

// ────────────────────────────────────────────────
// Update Navigation Dots
// ────────────────────────────────────────────────
function updateDots() {
  questionDots.innerHTML = '';
  quiz.questions.forEach((_, i) => {
    const dot = document.createElement('button');
    if (i === currentQuestion) {
      dot.className = 'btn btn-primary rounded-circle mx-1 fw-bold shadow-sm';
    } else if (answers[i] !== null) {
      dot.className = 'btn btn-success rounded-circle mx-1 text-white shadow-sm';
    } else {
      dot.className = 'btn btn-outline-secondary rounded-circle mx-1';
    }
    dot.style.width = '38px'; dot.style.height = '38px';
    dot.style.display = 'flex'; dot.style.alignItems = 'center'; dot.style.justifyContent = 'center';
    dot.textContent = i + 1;
    
    dot.onclick = () => { currentQuestion = i; renderQuestion(); };
    questionDots.appendChild(dot);
  });
}

// Navigation Buttons
prevBtn.onclick = () => { if (currentQuestion > 0) { currentQuestion--; renderQuestion(); } };
nextBtn.onclick = () => { 
    if (currentQuestion < quiz.questions.length - 1) { currentQuestion++; renderQuestion(); } 
    else { submitArea.scrollIntoView({ behavior: 'smooth' }); }
};

// ────────────────────────────────────────────────
// Submit Logic to Backend
// ────────────────────────────────────────────────
async function submitQuiz(auto = false) {
  const unansweredCount = answers.filter(a => a === null).length;
  if (!auto) {
    if (unansweredCount > 0) {
      if (!confirm(`You have ${unansweredCount} unanswered question(s). Submit anyway?`)) return;
    } else {
      if (!confirm("Are you sure you want to submit the quiz?")) return;
    }
  }

  clearInterval(timerInterval);

  // Calculate score locally
  let score = 0;
  quiz.questions.forEach((q, i) => {
    if (answers[i] === q.correct) score++;
  });

  // Send score to DB
  try {
      const response = await fetch('http://localhost/elp_project/api/assessments/submit_quiz.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
              assessmentId: quiz.id, 
              studentId: studentId, 
              score: score 
          })
      });

      const result = await response.json();
      if(result.success) {
          alert(`Quiz Submitted!\nYour Score: ${score} / ${quiz.questions.length}`);
          window.location.href = 'assessment.html';
      } else {
          alert("Error saving your quiz: " + result.error);
      }
  } catch (error) {
      console.error("Submission error:", error);
  }
}

function logout() { localStorage.clear(); window.location.href = 'index.html'; }

// Start
fetchQuiz();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
