<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grade Submissions - ELP Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background-color: #f4f7fe; font-family: 'Segoe UI', system-ui, sans-serif; }
    .top-navbar { background: white; border-bottom: 1px solid #e2e8f0; padding: 0.8rem 2.5rem; }
    .card-custom { border: none; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); background: white; margin-bottom: 1.5rem; }
    .status-badge { font-size: 0.8rem; padding: 0.3em 0.8em; font-weight: 600; }
  </style>
</head>
<body>

<nav class="top-navbar navbar border-bottom shadow-sm mb-4">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold fs-4" href="assessment.html">
      <i class="fas fa-arrow-left me-2 fs-5 text-muted"></i> Back to Assessments
    </a>
  </div>
</nav>

<div class="container py-4">
  <div class="card card-custom p-4 mb-4">
    <div class="d-flex justify-content-between align-items-center">
      <div>
        <h2 class="fw-bold text-dark mb-1" id="assessmentTitle">Loading Assessment...</h2>
        <p class="text-muted mb-0">Grade student submissions and provide feedback.</p>
      </div>
      <div class="text-end">
        <span class="badge bg-primary rounded-pill px-4 py-2" id="submissionStats">0 Submissions</span>
      </div>
    </div>
  </div>

  <div class="card card-custom p-0 overflow-hidden">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th class="ps-4">Student Name</th>
            <th>Submission Date</th>
            <th>Work / Data</th>
            <th>Status</th>
            <th>Score</th>
            <th class="text-end pe-4">Action</th>
          </tr>
        </thead>
        <tbody id="submissionsTable">
          <!-- Populated via JS -->
          <tr><td colspan="6" class="text-center py-5 text-muted"><i class="fas fa-spinner fa-spin me-2"></i> Loading submissions...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Grading Modal -->
<div class="modal fade" id="gradeModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header bg-light">
        <h5 class="modal-title fw-bold">Grade Submission</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <p class="mb-4">Student: <strong id="modalStudentName"></strong></p>
        <div class="mb-3">
          <label class="form-label fw-bold">Score (Max: <span id="maxPossible">100</span>)</label>
          <input type="number" class="form-control" id="modalScore" placeholder="Enter score">
        </div>
        <div class="mb-0">
          <label class="form-label fw-bold">Feedback</label>
          <textarea class="form-control" id="modalFeedback" rows="4" placeholder="Add comments for the student..."></textarea>
        </div>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary rounded-pill px-4" id="saveGradeBtn" onclick="saveGrade()">Save Grade</button>
      </div>
    </div>
  </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const assessmentId = urlParams.get('id');
let currentSubmissionId = null;
let maxScore = 100;

async function loadSubmissions() {
    try {
        const res = await fetch(`../api/assessments/get_submissions.php?id=${assessmentId}`);
        const data = await res.json();
        
        document.getElementById('assessmentTitle').textContent = data.assessment.Title;
        document.getElementById('submissionStats').textContent = `${data.submissions.length} Submissions`;
        maxScore = data.assessment.MaxScore;
        document.getElementById('maxPossible').textContent = maxScore;

        const table = document.getElementById('submissionsTable');
        table.innerHTML = '';

        if (data.submissions.length === 0) {
            table.innerHTML = '<tr><td colspan="6" class="text-center py-5">No submissions found yet.</td></tr>';
            return;
        }

        data.submissions.forEach(sub => {
            const isGraded = sub.GradingStatus === 'graded';
            const scoreDisplay = isGraded ? `<span class="fw-bold text-dark">${sub.ScoreEarned}</span> / ${maxScore}` : `<span class="text-muted">_ / ${maxScore}</span>`;
            
            let workLink = 'N/A';
            if (sub.SubmissionLink) {
                let displayLink = sub.SubmissionLink;
                if (!/^https?:\/\//i.test(displayLink)) displayLink = 'https://' + displayLink;
                workLink = `<a href="${displayLink}" target="_blank" class="text-primary text-decoration-none fw-medium"><i class="fas fa-external-link-alt me-1"></i> View Work</a>`;
            } else if (sub.AnswersJSON) {
                workLink = `<span class="text-muted small italic">MCQ Results</span>`;
            }

            table.innerHTML += `
                <tr>
                    <td class="ps-4 fw-medium text-dark">${sub.FirstName} ${sub.LastName}</td>
                    <td>${new Date(sub.SubmissionDate).toLocaleString()}</td>
                    <td>${workLink}</td>
                    <td><span class="badge ${isGraded ? 'bg-success-subtle text-success' : 'bg-warning-subtle text-warning'} status-badge rounded-pill">${sub.GradingStatus.toUpperCase()}</span></td>
                    <td>${scoreDisplay}</td>
                    <td class="text-end pe-4">
                        <button class="btn btn-sm ${isGraded ? 'btn-outline-secondary' : 'btn-primary'} rounded-pill px-3" 
                                onclick="openGradeModal(${sub.SubmissionID}, '${sub.FirstName} ${sub.LastName}', '${sub.ScoreEarned || ''}', \`${sub.Feedback || ''}\`)">
                            ${isGraded ? 'Edit Grade' : 'Grade'}
                        </button>
                    </td>
                </tr>
            `;
        });
    } catch (err) { console.error(err); }
}

function openGradeModal(sid, name, score, feedback) {
    currentSubmissionId = sid;
    document.getElementById('modalStudentName').textContent = name;
    document.getElementById('modalScore').value = score;
    document.getElementById('modalFeedback').value = feedback;
    new bootstrap.Modal(document.getElementById('gradeModal')).show();
}

async function saveGrade() {
    const score = document.getElementById('modalScore').value;
    const feedback = document.getElementById('modalFeedback').value;
    if (score === '' || score < 0 || score > maxScore) return alert(`Please enter a valid score (0-${maxScore})`);

    const btn = document.getElementById('saveGradeBtn');
    btn.disabled = true;

    try {
        const res = await fetch('../api/assessments/grade_submission.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ submissionId: currentSubmissionId, score, feedback })
        });
        const result = await res.json();
        if (result.success) {
            bootstrap.Modal.getInstance(document.getElementById('gradeModal')).hide();
            loadSubmissions();
        } else {
            alert("Error: " + result.error);
        }
    } catch (err) { console.error(err); }
    finally { btn.disabled = false; }
}

loadSubmissions();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
