<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Courses - ELP Platform</title>

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  
  <link rel="stylesheet" href="css/style.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    body { background-color: #f5f7ff; font-family: 'Segoe UI', system-ui, sans-serif; }
    .sidebar {
      min-height: 100vh;
      background: white;
      border-right: 1px solid #e0e0e0;
      position: fixed;
      width: 240px;
      top: 0; left: 0;
      padding-top: 80px;
      overflow-y: auto;
    }
    .sidebar .nav-link {
      color: #495057;
      padding: 0.9rem 1.5rem;
      font-weight: 500;
    }
    .sidebar .nav-link:hover,
    .sidebar .nav-link.active {
      background-color: #e7f0ff;
      color: #0d6efd;
    }
    .sidebar .nav-link i { width: 24px; text-align: center; margin-right: 12px; }
    .main-content { margin-left: 240px; padding: 2rem 2.5rem; }
    .top-navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: white;
      border-bottom: 1px solid #e0e0e0;
      padding: 1rem 2.5rem;
    }
    .course-card {
      border: none;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      transition: all 0.25s ease;
      background: white;
    }
    .course-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.12);
    }
    .course-thumbnail {
      height: 160px;
      background-size: cover;
      background-position: center;
    }
    .badge-enrolled {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 0.8rem;
      padding: 0.45em 0.9em;
    }
    .create-course-btn {
      font-size: 1.1rem;
      padding: 0.75rem 1.8rem;
    }
  </style>
</head>
<body>

<!-- Top Navbar -->
<nav class="top-navbar navbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold fs-4" href="dashboard.html">
      ELP <span class="text-primary">Platform</span>
    </a>
    <div class="ms-auto d-flex align-items-center gap-4">
      <div class="dropdown">
        <a class="d-flex align-items-center text-decoration-none dropdown-toggle" href="#" data-bs-toggle="dropdown">
          <div class="me-3 text-end">
            <div id="userFullName" class="fw-medium">Loading...</div>
            <small id="userRoleBadge" class="text-muted"></small>
          </div>
          <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" style="width:42px;height:42px;">
            <i class="fas fa-user"></i>
          </div>
        </a>
        <ul class="dropdown-menu dropdown-menu-end">
          <li><a class="dropdown-item" href="profile.html"><i class="fas fa-user me-2"></i> Profile</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i> Logout</a></li>
        </ul>
      </div>
    </div>
  </div>
</nav>

<!-- Sidebar -->
<div class="sidebar">
  <div class="nav flex-column" id="sidebarMenu"></div>
</div>

<!-- Main Content -->
<div class="main-content">

  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
    <h2 class="mb-0 fw-bold">Courses</h2>

    <!-- Instructor-only: Create Course button -->
    <button id="createCourseBtn" class="btn btn-primary create-course-btn d-none" data-bs-toggle="modal" data-bs-target="#createCourseModal">
      <i class="fas fa-plus me-2"></i> Create New Course
    </button>
  </div>

  <!-- Search & Filter (visible to students mostly) -->
  <div class="row mb-4" id="studentFilters" style="display:none;">
    <div class="col-md-6">
      <div class="input-group">
        <span class="input-group-text"><i class="fas fa-search"></i></span>
        <input type="text" id="searchInput" class="form-control" placeholder="Search courses...">
      </div>
    </div>
    <div class="col-md-3">
      <select class="form-select">
        <option selected>Category: All</option>
        <option>Programming</option>
        <option>Database</option>
        <option>Web Development</option>
        <option>Data Science</option>
        <option>Others</option>
      </select>
    </div>
    <div class="col-md-3">
      <select class="form-select">
        <option selected>Sort by: Newest</option>
        <option>Most Popular</option>
        <option>Price: Low to High</option>
      </select>
    </div>
  </div>

  <!-- Course Grid -->
  <div class="row g-4" id="courseGrid">
    <!-- Courses will be inserted here by JavaScript -->
  </div>

</div>

<!-- ────────────────────────────────────────────────
     CREATE COURSE MODAL (Instructor only)
───────────────────────────────────────────────── -->
<div class="modal fade" id="createCourseModal" tabindex="-1" aria-labelledby="createCourseModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="createCourseModalLabel">Create New Course</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="createCourseForm">
          <div class="mb-3">
            <label for="courseTitle" class="form-label fw-medium">Course Title <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="courseTitle" required placeholder="e.g. Database Systems with MySQL">
          </div>

          <div class="mb-3">
            <label for="courseDescription" class="form-label fw-medium">Description <span class="text-danger">*</span></label>
            <textarea class="form-control" id="courseDescription" rows="4" required placeholder="Brief overview of what students will learn..."></textarea>
          </div>

          <div class="row g-3">
            <div class="col-md-6">
              <label for="courseCategory" class="form-label fw-medium">Category</label>
              <select class="form-select" id="courseCategory">
                <option>Programming</option>
                <option>Database</option>
                <option>Web Development</option>
                <option>Data Science</option>
                <option>Others</option>
              </select>
            </div>
            <div class="col-md-6">
              <label for="courseLevel" class="form-label fw-medium">Level</label>
              <select class="form-select" id="courseLevel">
                <option>Beginner</option>
                <option>Intermediate</option>
                <option>Advanced</option>
              </select>
            </div>
          </div>

          <div class="mt-4">
            <label class="form-label fw-medium">Course Thumbnail</label>
            <input type="file" class="form-control" accept="image/*" id="courseThumbnail">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary" onclick="createCourse()">Create Course</button>
      </div>
    </div>
  </div>
</div>

<script>
// ────────────────────────────────────────────────
//  Role & UI logic
// ────────────────────────────────────────────────

const role = localStorage.getItem('userRole') || 'student';
const name = localStorage.getItem('userName') || 'User';

document.getElementById('userFullName').textContent = name;
document.getElementById('userRoleBadge').textContent = role.charAt(0).toUpperCase() + role.slice(1);

// Sidebar
const menu = document.getElementById('sidebarMenu');
let menuHTML = '';

if (role === 'student') {
  menuHTML = `
    <a href="../dashboard.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
    <a href="courses.html" class="nav-link active"><i class="fas fa-book-open"></i> Courses</a>
    <a href="enroll.html" class="nav-link"><i class="fas fa-search"></i> Browse & Enroll</a>
    <a href="assessment.html" class="nav-link"><i class="fas fa-tasks"></i> Assessments</a>
    <a href="profile.html" class="nav-link"><i class="fas fa-user"></i> Profile</a>
  `;
  document.getElementById('studentFilters').style.display = 'flex';
} else if (role === 'instructor') {
  menuHTML = `
    <a href="../dashboard.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
    <a href="courses.html" class="nav-link active"><i class="fas fa-chalkboard-teacher"></i> My Courses</a>
    <a href="content.html" class="nav-link"><i class="fas fa-upload"></i> Content Management</a>
    <a href="assessment.html" class="nav-link"><i class="fas fa-check-double"></i> Student Results</a>
    <a href="profile.html" class="nav-link"><i class="fas fa-user"></i> Profile</a>
  `;
  document.getElementById('createCourseBtn').classList.remove('d-none');
} else if (role === 'admin') {
  menuHTML = `
    <a href="../dashboard.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
    <a href="admin.html" class="nav-link"><i class="fas fa-users-cog"></i> Users</a>
    <a href="admin.html#courses" class="nav-link active"><i class="fas fa-book"></i> Courses</a>
    <a href="admin.html#analytics" class="nav-link"><i class="fas fa-chart-bar"></i> Analytics</a>
  `;
}

menu.innerHTML = menuHTML;

// ────────────────────────────────────────────────
//  Fake course data (replace with API fetch later)
// ────────────────────────────────────────────────

const sampleCourses = [
  { id:1, title:"Database Systems with MySQL", category:"Database", level:"Intermediate", instructor:"Prof. Rahman", thumbnail:"https://images.unsplash.com/photo-1517430816045-df4b7de11d1d?w=800", enrolled:true, progress:65 },
  { id:2, title:"Modern JavaScript & ES6+", category:"Programming", level:"Beginner", instructor:"Sadia Akter", thumbnail:"https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=800", enrolled:false },
  { id:3, title:"Full-Stack Web Development", category:"Web Development", level:"Intermediate", instructor:"Asif Amin", thumbnail:"https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=800", enrolled:true, progress:28 },
  { id:4, title:"Python for Data Science", category:"Data Science", level:"Beginner", instructor:"Dr. Karim", thumbnail:"https://images.unsplash.com/photo-1551288049-b1f4d7b0d6e8?w=800", enrolled:false },
  { id:5, title:"Advanced SQL & Performance Tuning", category:"Database", level:"Advanced", instructor:"Prof. Rahman", thumbnail:"https://images.unsplash.com/photo-1518770660439-4636190af475?w=800", enrolled:false }
];

function renderCourses(courses) {
  const grid = document.getElementById('courseGrid');
  grid.innerHTML = '';

  courses.forEach(course => {
    const isEnrolled = course.enrolled;
    const card = document.createElement('div');
    card.className = 'col-lg-4 col-md-6';

    card.innerHTML = `
      <div class="course-card position-relative">
        <div class="course-thumbnail" style="background-image: url('${course.thumbnail}')"></div>
        ${isEnrolled ? `<span class="badge bg-success badge-enrolled">Enrolled</span>` : ''}
        <div class="card-body">
          <h5 class="card-title">${course.title}</h5>
          <p class="text-muted small mb-2">${course.category} • ${course.level}</p>
          <p class="small mb-3">By ${course.instructor}</p>
          
          ${role === 'student' ? `
            ${isEnrolled ? `
              <div class="progress mb-2" style="height:8px;">
                <div class="progress-bar bg-success" role="progressbar" style="width: ${course.progress}%" aria-valuenow="${course.progress}" aria-valuemin="0" aria-valuemax="100"></div>
              </div>
              <small class="text-muted">${course.progress}% complete</small>
            ` : `
              <button class="btn btn-outline-primary btn-sm w-100" onclick="enrollCourse(${course.id})">
                <i class="fas fa-plus me-1"></i> Enroll Now
              </button>
            `}
          ` : `
            <div class="d-flex gap-2 mt-2">
              <button class="btn btn-outline-primary btn-sm flex-grow-1"><i class="fas fa-edit"></i> Edit</button>
              <button class="btn btn-outline-danger btn-sm"><i class="fas fa-trash"></i></button>
            </div>
          `}
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

// Initial render
renderCourses(sampleCourses.filter(c => {
  if (role === 'instructor') return true; // show all for instructor (in real → only their courses)
  return true; // student sees all
}));

// Simple search (client-side demo)
document.getElementById('searchInput')?.addEventListener('input', e => {
  const term = e.target.value.toLowerCase();
  const filtered = sampleCourses.filter(c => 
    c.title.toLowerCase().includes(term) || 
    c.category.toLowerCase().includes(term)
  );
  renderCourses(filtered);
});

// Demo enroll action
function enrollCourse(id) {
  alert(`Enrolling in course #${id}\n\n(In real app → POST /api/enrollments)`);
  // You would update local state / call API here
}

// Demo create course
function createCourse() {
  const title = document.getElementById('courseTitle').value.trim();
  if (!title) {
    alert("Please enter a course title");
    return;
  }
  alert(`Course "${title}" would be created!\n\n(In real app → POST /api/courses)`);
  // Close modal
  bootstrap.Modal.getInstance(document.getElementById('createCourseModal')).hide();
}

function logout() {
  localStorage.clear();
  window.location.href = 'index.html';
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
