<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Questions - ELP Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background-color: #f4f7fe; font-family: 'Segoe UI', system-ui, sans-serif; }
    .top-navbar {
      background: white; border-bottom: 1px solid #e2e8f0; padding: 0.8rem 2.5rem;
    }
    .card-custom {
      border: none; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); background: white;
      margin-bottom: 1.5rem;
    }
    .question-item {
      border-left: 4px solid #0d6efd;
      padding: 1rem;
      background: #f8fafc;
      border-radius: 8px;
      margin-bottom: 1rem;
    }
    .correct-ans { color: #10b981; font-weight: 600; }
  </style>
</head>
<body>

<nav class="top-navbar navbar border-bottom shadow-sm mb-4">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold fs-4" href="assessment.html">
      <i class="fas fa-arrow-left me-2 fs-5 text-muted"></i> Back to Assessments
    </a>
  </div>
</nav>

<div class="container py-4">
  <div class="row">
    <!-- Left: Add Question Form -->
    <div class="col-lg-5">
      <div class="card card-custom p-4 sticky-top" style="top: 100px;">
        <h4 class="fw-bold mb-4">Add New Question</h4>
        <form id="addQuestionForm">
          <div class="mb-3">
            <label class="form-label fw-medium">Question Text</label>
            <textarea class="form-control" id="qText" rows="3" placeholder="Enter your question here..." required></textarea>
          </div>
          
          <div class="mb-3">
            <label class="form-label fw-medium">Options</label>
            <div class="input-group mb-2">
              <span class="input-group-text bg-light text-muted">A</span>
              <input type="text" class="form-control" id="optA" placeholder="Option A" required>
            </div>
            <div class="input-group mb-2">
              <span class="input-group-text bg-light text-muted">B</span>
              <input type="text" class="form-control" id="optB" placeholder="Option B" required>
            </div>
            <div class="input-group mb-2">
              <span class="input-group-text bg-light text-muted">C</span>
              <input type="text" class="form-control" id="optC" placeholder="Option C" required>
            </div>
            <div class="input-group mb-2">
              <span class="input-group-text bg-light text-muted">D</span>
              <input type="text" class="form-control" id="optD" placeholder="Option D" required>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-medium">Correct Option</label>
            <select class="form-select" id="correctIdx">
              <option value="0">Option A</option>
              <option value="1">Option B</option>
              <option value="2">Option C</option>
              <option value="3">Option D</option>
            </select>
          </div>

          <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 shadow-sm">
            <i class="fas fa-plus me-2"></i> Add Question
          </button>
        </form>
      </div>
    </div>

    <!-- Right: Current Questions List -->
    <div class="col-lg-7">
      <div class="card card-custom p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">Current Questions</h4>
            <span class="badge bg-light text-primary border rounded-pill px-3" id="qCount">0 Questions</span>
        </div>
        <div id="questionsList">
           <!-- Populated via JS -->
           <div class="text-center py-5 text-muted">
             <i class="fas fa-spinner fa-spin fa-2x mb-3"></i>
             <p>Loading questions...</p>
           </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const assessmentId = urlParams.get('id');

if (!assessmentId) {
    alert("Invalid Assessment ID");
    window.location.href = "assessment.html";
}

async function loadQuestions() {
    try {
        const res = await fetch(`../api/assessments/get_quiz_details.php?quizId=${assessmentId}`);
        const data = await res.json();
        
        document.getElementById('qCount').textContent = `${data.questions.length} Questions`;
        const list = document.getElementById('questionsList');
        list.innerHTML = '';

        if (data.questions.length === 0) {
            list.innerHTML = '<div class="text-center py-5 text-muted">No questions yet. Add your first one!</div>';
            return;
        }

        data.questions.forEach((q, idx) => {
            list.innerHTML += `
               <div class="question-item shadow-sm">
                 <h6 class="fw-bold mb-2">${idx + 1}. ${q.text}</h6>
                 <div class="row g-2 small">
                   <div class="col-6 ${q.correct === 0 ? 'correct-ans' : 'text-muted'}">A. ${q.options[0]}</div>
                   <div class="col-6 ${q.correct === 1 ? 'correct-ans' : 'text-muted'}">B. ${q.options[1]}</div>
                   <div class="col-6 ${q.correct === 2 ? 'correct-ans' : 'text-muted'}">C. ${q.options[2]}</div>
                   <div class="col-6 ${q.correct === 3 ? 'correct-ans' : 'text-muted'}">D. ${q.options[3]}</div>
                 </div>
               </div>
            `;
        });
    } catch (err) {
        console.error(err);
    }
}

document.getElementById('addQuestionForm').onsubmit = async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.disabled = true;

    const payload = {
        assessmentId: assessmentId,
        text: document.getElementById('qText').value,
        options: [
            document.getElementById('optA').value,
            document.getElementById('optB').value,
            document.getElementById('optC').value,
            document.getElementById('optD').value
        ],
        correctIndex: parseInt(document.getElementById('correctIdx').value)
    };

    try {
        const res = await fetch('../api/assessments/add_question.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const result = await res.json();
        if (result.success) {
            e.target.reset();
            loadQuestions();
        } else {
            alert("Error: " + result.error);
        }
    } catch (err) {
        console.error(err);
    } finally {
        btn.disabled = false;
    }
};

loadQuestions();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
