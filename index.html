<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ELP - E-Learning Platform</title>

  <!-- Bootstrap 5.3 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-x2+hI2eK2c6x3i2N4b3x3zO0v3t8fKz5vZ2f2v4q5f5v5f5v5f5v5f5v5f5v5f5v5f5v5f5v5f5v5f5v5f5v5f5" crossorigin="anonymous"/>

  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .auth-card {
      background: rgba(255, 255, 255, 0.96);
      border: none;
      border-radius: 16px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.28);
      overflow: hidden;
      max-width: 480px;
      margin: 1.5rem auto;
    }
    .auth-header {
      background: linear-gradient(90deg, #4e54c8, #8f94fb);
      color: white;
      padding: 2.2rem 1.5rem;
      text-align: center;
    }
    .auth-body {
      padding: 2.2rem 2.5rem;
    }
    .form-label {
      font-weight: 500;
      color: #444;
    }
    .btn-primary {
      background: linear-gradient(90deg, #667eea, #764ba2);
      border: none;
      padding: 0.75rem;
      font-weight: 600;
      transition: all 0.3s;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(100, 100, 255, 0.35);
    }
    .toggle-link {
      color: #667eea;
      font-weight: 500;
      cursor: pointer;
    }
    .toggle-link:hover {
      text-decoration: underline;
    }
    .input-group-text {
      background-color: #f8f9fa;
    }
    .form-control:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 0.25rem rgba(102, 126, 234, 0.25);
    }
  </style>
</head>
<body>

<div class="container">

  <!-- LOGIN CARD -->
  <div class="card auth-card" id="loginCard">
    <div class="auth-header">
      <h3 class="mb-1 fw-bold">E-Learning Platform</h3>
      <p class="mb-0 opacity-75">Sign in to continue learning</p>
    </div>

    <div class="auth-body">
      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label for="loginEmail" class="form-label">Email address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="far fa-envelope"></i></span>
            <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com" required>
          </div>
        </div>

        <div class="mb-4">
          <label for="loginPassword" class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required>
          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe">
            <label class="form-check-label" for="rememberMe">Remember me</label>
          </div>
          <a href="#" class="small text-muted">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-3">
          <i class="fas fa-sign-in-alt me-2"></i> Sign In
        </button>

        <div class="text-center">
          <span>Don't have an account? </span>
          <span class="toggle-link" onclick="showRegister()">Create account</span>
        </div>
      </form>
    </div>
  </div>

  <!-- REGISTER CARD (hidden by default) -->
  <div class="card auth-card d-none" id="registerCard">
    <div class="auth-header">
      <h3 class="mb-1 fw-bold">Create Account</h3>
      <p class="mb-0 opacity-75">Join our learning community today</p>
    </div>

    <div class="auth-body">
      <form id="registerForm" novalidate>
        <div class="row g-3">
          <div class="col-md-6">
            <label for="firstName" class="form-label">First name</label>
            <input type="text" class="form-control" id="firstName" required>
          </div>
          <div class="col-md-6">
            <label for="lastName" class="form-label">Last name</label>
            <input type="text" class="form-control" id="lastName" required>
          </div>
        </div>

        <div class="mb-3 mt-3">
          <label for="registerEmail" class="form-label">Email address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="far fa-envelope"></i></span>
            <input type="email" class="form-control" id="registerEmail" placeholder="name@example.com" required>
          </div>
        </div>

        <div class="mb-3">
          <label for="registerPassword" class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input type="password" class="form-control" id="registerPassword" placeholder="At least 8 characters" required minlength="8">
          </div>
        </div>

        <div class="mb-4">
          <label for="registerRole" class="form-label">I want to join as</label>
          <select class="form-select" id="registerRole" required>
            <option value="" disabled selected>Select role...</option>
            <option value="student">Student / Learner</option>
            <option value="instructor">Instructor / Teacher</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-3">
          <i class="fas fa-user-plus me-2"></i> Create Account
        </button>

        <div class="text-center">
          <span>Already have an account? </span>
          <span class="toggle-link" onclick="showLogin()">Sign in</span>
        </div>
      </form>
    </div>
  </div>

</div>

<script>
// simple front-end toggle (real app would use better state management)
function showRegister() {
  document.getElementById('loginCard').classList.add('d-none');
  document.getElementById('registerCard').classList.remove('d-none');
}

function showLogin() {
  document.getElementById('registerCard').classList.add('d-none');
  document.getElementById('loginCard').classList.remove('d-none');
}

// Just for demo – in real project these would call your backend
document.getElementById('loginForm')?.addEventListener('submit', e => {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  
  // For demonstration only – later you'll check real credentials
  let role = "student";
  if (email.includes("teacher") || email.includes("instructor")) {
    role = "instructor";
  } else if (email.includes("admin")) {
    role = "admin";
  }

  localStorage.setItem('userEmail', email);
  localStorage.setItem('userRole', role);
  localStorage.setItem('isLoggedIn', 'true');

  window.location.href = "dashboard.html";
});

document.getElementById('registerForm')?.addEventListener('submit', e => {
  e.preventDefault();
  alert("Registration would be sent to backend.\n\nIn real project → POST /api/register");
  // You would do fetch() here later
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
